<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @page { size: 8.5in 14in; margin: 0.3in; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; padding: 0; font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    @media screen {
      html, body { 
        overflow: auto;
        width: 8.5in;
        margin: 0 auto;
      }
    }
    
    .page {
      height: 13.4in;
      max-height: 13.4in;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .page-header {
      border: 3px solid #F0566E;
      border-radius: 8px;
      height: 0.9in;
      max-height: 0.9in;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      background-size: cover;
      background-position: center;
    }
    .page-header-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 1;
    }
    .page-header-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0.05in 0.05in 0.05in 0.3in;
      color: black;
    }
    .page-header-content h1 { font-size: 1.6em; margin: 0; }
    .page-header-content h2 { font-size: 1.2em; margin: 0; }
    .page-header-content p { font-size: 0.85em; margin: 0.05em 0 0; font-weight: bold; }
    
    .page-content {
      display: flex;
      flex: 1;
      gap: 0.2in;
      padding-top: 0.2in;
      overflow: hidden;
    }
    
    .ad-column {
      width: 2.25in;
      display: flex;
      flex-direction: column;
      gap: 0.12in;
      overflow: hidden;
      flex-shrink: 0;
    }
    
    .ad-separator {
      width: 100%;
      max-height: 0.75in;
      overflow: hidden;
    }
    .ad-separator img {
      width: 100%;
      height: auto;
      max-height: 0.75in;
      object-fit: contain;
    }
    
    .main-content {
      flex: 1;
      border-left: 1px solid #ccc;
      border-right: 1px solid #ccc;
      padding: 0.12in;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .content-block {
      border-bottom: 1px solid #ccc;
      padding-bottom: 0.1in;
      padding-left: 0.1in;
      margin-bottom: 0.1in;
      font-size: 11pt;
      line-height: 1.4;
    }
    .content-block:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }
    .content-block h1 { font-size: 1.4em; margin-bottom: 0.1in; }
    .content-block h2 { font-size: 1.2em; margin-bottom: 0.08in; }
    .content-block p { margin-bottom: 0.08in; }
    .content-block ul, .content-block ol { margin-left: 0.2in; }
    .content-block li { margin-bottom: 0.04in; }
    .content-separator {
      min-height: 0.4in;
      max-height: 2in;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.15in;
    }
    .content-separator img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    .ad-section {
      border: 3px solid #F0566E;
      border-radius: 8px;
      overflow: hidden;
      height: 2.6in;
      flex-shrink: 0;
      background: white;
    }
    .ad-section-inner {
      width: 100%;
      height: 100%;
      border-radius: 4px;
      overflow: hidden;
    }
    .ad-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .ad-style-1 {
      border: 4px solid #F0566E;
      box-shadow: 6px 6px 0 #F0566E, inset 0 0 0 6px white;
    }
    .ad-style-2 {
      border: 5px double #F0566E;
    }
    .ad-style-3 {
      border: 5px dashed white;
      box-shadow: 0 0 0 4px #F0566E;
    }
    .ad-style-4 {
      border: 4px solid #F0566E;
      box-shadow: inset 0 0 0 8px white, inset 0 0 0 12px #F0566E;
    }
    .ad-style-5 {
      border: 4px solid #F0566E;
      box-shadow: inset 0 0 0 10px white, 8px 8px 0 #F0566E;
    }
    
    .page2 {
      height: 13.4in;
      max-height: 13.4in;
      display: flex;
      flex-direction: column;
      gap: 0.2in;
      overflow: hidden;
    }
    .page2-header {
      border: 3px solid #F0566E;
      border-radius: 8px;
      padding: 0.15in;
      height: 1in;
      max-height: 1in;
      overflow: hidden;
      flex-shrink: 0;
    }
    .page2-header-credits {
      font-size: 1em;
      color: #666;
      margin-top: 0.05in;
    }
    .page2-image-area {
      flex: 1;
      border: 3px dashed #F0566E;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      position: relative;
    }
    .page2-image-area.has-image-border {
      border: none;
      position: relative;
    }
    .page2-image-area.has-image-border .border-left,
    .page2-image-area.has-image-border .border-right {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 40px;
      background-image: url('../images/page2/borders/{{PAGE2_BORDER_FILE}}');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center center;
      z-index: 1;
    }
    .page2-image-area.has-image-border .border-left {
      left: 0;
    }
    .page2-image-area.has-image-border .border-right {
      right: 0;
    }
    .page2-image-area.has-image-border .border-left {
      left: 0;
      transform: scaleX(-1);
      -webkit-transform: scaleX(-1);
      transform-origin: center center;
      -webkit-transform-origin: center center;
    }
    .page2-image-area.has-image-border .border-right {
      right: 0;
    }
    .page2-image-area.has-image-border img {
      position: absolute;
      left: 40px;
      right: 40px;
      top: 0;
      bottom: 0;
      width: calc(100% - 80px);
      height: 100%;
      object-fit: contain;
      object-position: center center;
    }
    .page2-border-tile, .page2-image-area.has-image-border::before, .page2-image-area.has-image-border::after {
      display: none;
    }
    .page2-image-area.has-image-border img {
      position: absolute;
      left: 40px;
      right: 40px;
      top: 0;
      bottom: 0;
      width: calc(100% - 80px);
      height: 100%;
      object-fit: contain;
      object-position: center center;
    }
    .page2-image-area img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center top;
    }
    .page2-footer {
      border: 3px solid #F0566E;
      border-radius: 8px;
      padding: 0.15in;
      padding-bottom: 0.25in;
      height: 1.5in;
      max-height: 1.5in;
      overflow: hidden;
      flex-shrink: 0;
    }
    .title-image-spot {
      height: 100%;
      object-fit: contain;
      object-position: right center;
      display: block;
    }
    .page-header-bg.title-image-spot {
      position: absolute;
      right: 0;
      left: auto;
      width: auto;
      max-width: 50%;
    }
    .page-header-bg:not(.title-image-spot) {
      border: 3px solid #F0566E;
      border-radius: 8px;
      padding: 0.15in;
      height: 1.5in;
      max-height: 1.5in;
      overflow: hidden;
      flex-shrink: 0;
    }
    .page-footer {
      border-top: 3px solid #F0566E;
      padding: 0.1in;
      margin-top: 0.15in;
      max-height: 1.5in;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sponsor-cta {
      margin-bottom: 0.15in;
      padding-bottom: 0.15in;
      border-bottom: 1px solid #ccc;
    }
    .ad-credits {
      font-size: 0.7em;
      color: #666;
      line-height: 1.4;
    }
    .ad-credits-inline {
      display: inline;
    }
    .ad-credits-inline::after {
      content: " | ";
    }
    .ad-credits-inline:last-child::after {
      content: "";
    }
    .sep-credits {
      font-size: 0.7em;
      color: #666;
      margin-top: 0.05in;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <img class="page-header-bg{{TITLE_IMAGE_SPOT}}" src="{{TITLE_IMAGE}}">
      <div class="page-header-content">{{TITLE}}</div>
    </div>
    <div class="page-content">
      <div class="ad-column">{{AD_COLUMN_1}}</div>
      <div class="main-content">{{MAIN_CONTENT}}</div>
      <div class="ad-column">{{AD_COLUMN_2}}</div>
    </div>
    <div class="page-footer">
      <div class="sponsor-cta">{{PAGE1_CTA}}</div>
      <div class="ad-credits">{{AD_CREDITS}}</div>
      <div class="sep-credits">{{SEP_CREDITS}}</div>
    </div>
  </div>
  
  <div class="page2">
    <div class="page2-header">
      {{TITLE2}}
      <div class="page2-header-credits">{{PAGE2_CREDITS}}</div>
    </div>
    <div class="page2-image-area {{PAGE2_BORDER_IMAGE}}">
      <div class="border-left"></div>
      <div class="border-right"></div>
      <img src="{{PAGE2_IMAGE}}">
    </div>
    <div class="page2-footer">{{PAGE2_FOOTER}}</div>
  </div>
</body>
</html>
